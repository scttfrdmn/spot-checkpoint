name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev --extra compress

      - name: Lint
        run: uv run ruff check src/

      - name: Type check
        run: uv run mypy src/ --strict

      - name: Test with coverage
        run: |
          uv run pytest -q \
            --ignore=tests/test_storage_s3.py \
            --cov=spot_checkpoint \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
